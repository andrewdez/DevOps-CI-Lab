name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build project
      run: dotnet build --no-restore --configuration Release
      
    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Simulate Deploy via SSH (Mock Deployment)
      run: |
        echo "========================================="
        echo "Initiating deployment sequence..."
        echo "Target Host: ${{ secrets.SSH_HOST }}"
        echo "User: ${{ secrets.SSH_USERNAME }}"
        echo "Authenticating using SSH Key... [OK]"
        echo "========================================="
        echo "Deploying .NET application..."
        echo "Running: git pull origin main"
        echo "Running: dotnet publish -c Release -o ./publish"
        echo "Restarting application service..."
        echo "========================================="
        echo "Deployment completed successfully!"